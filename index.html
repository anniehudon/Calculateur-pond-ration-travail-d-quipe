<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculateur – Pondération par les pairs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      color: #1a1a18;
      margin-bottom: 1.5rem;
    }

    .card {
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }

    .section-label {
      font-size: 11px;
      color: #888780;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    .col-header {
      display: grid;
      grid-template-columns: 110px 1fr 64px 32px;
      gap: 8px;
      padding-bottom: 6px;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
      margin-bottom: 8px;
    }

    .col-header span {
      font-size: 11px;
      color: #b4b2a9;
    }

    .col-header span:nth-child(2),
    .col-header span:nth-child(3) {
      text-align: center;
    }

    .peer-row {
      display: grid;
      grid-template-columns: 110px 1fr 64px 32px;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .peer-label {
      font-size: 14px;
      color: #5f5e5a;
    }

    .peer-row input[type="text"],
    .peer-row input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      font-size: 16px;
      font-weight: 500;
      text-align: center;
      border: 0.5px solid rgba(0,0,0,0.15);
      border-radius: 8px;
      background: #fafaf8;
      color: #1a1a18;
      outline: none;
      -moz-appearance: textfield;
    }

    .peer-row input[type="text"]::-webkit-outer-spin-button,
    .peer-row input[type="text"]::-webkit-inner-spin-button,
    .peer-row input[type="number"]::-webkit-outer-spin-button,
    .peer-row input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    .peer-row input:focus {
      border-color: rgba(55, 138, 221, 0.5);
      box-shadow: 0 0 0 3px rgba(55, 138, 221, 0.12);
      background: #fff;
    }

    .peer-row input.invalid {
      border-color: rgba(226, 75, 74, 0.5);
      background: #fff8f8;
    }

    .pct-display {
      font-size: 14px;
      font-weight: 500;
      color: #5f5e5a;
      text-align: center;
    }

    .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #b4b2a9;
      font-size: 18px;
      line-height: 1;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .remove-btn:hover {
      color: #e24b4a;
      background: #fcebeb;
    }

    .add-btn {
      margin-top: 8px;
      font-size: 13px;
      padding: 7px 14px;
      border: 0.5px solid rgba(0,0,0,0.15);
      border-radius: 8px;
      background: none;
      cursor: pointer;
      color: #5f5e5a;
    }

    .add-btn:hover { background: #f5f5f3; }
    .add-btn:disabled { opacity: 0.4; cursor: default; }

    .work-note-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .work-note-wrap label {
      font-size: 14px;
      color: #5f5e5a;
      flex-shrink: 0;
    }

    #work-note {
      width: 100px;
      padding: 8px 10px;
      font-size: 18px;
      font-weight: 500;
      text-align: center;
      border: 0.5px solid rgba(0,0,0,0.15);
      border-radius: 8px;
      background: #fafaf8;
      color: #1a1a18;
      outline: none;
      -moz-appearance: textfield;
    }

    #work-note::-webkit-outer-spin-button,
    #work-note::-webkit-inner-spin-button { -webkit-appearance: none; }

    #work-note:focus {
      border-color: rgba(55, 138, 221, 0.5);
      box-shadow: 0 0 0 3px rgba(55, 138, 221, 0.12);
      background: #fff;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .metric {
      background: #f5f5f3;
      border-radius: 8px;
      padding: 0.9rem 0.75rem;
      text-align: center;
    }

    .metric-label {
      font-size: 12px;
      color: #888780;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .metric-value {
      font-size: 24px;
      font-weight: 500;
      color: #1a1a18;
    }

    .metric-value.accent { color: #185fa5; }

    .metric-sub {
      font-size: 11px;
      color: #b4b2a9;
      margin-top: 2px;
    }

    .formula {
      font-size: 12px;
      color: #b4b2a9;
      text-align: center;
      margin-top: 12px;
    }

    .error-msg {
      font-size: 12px;
      color: #a32d2d;
      margin-top: 4px;
      display: none;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Pondération par évaluation des pairs</h1>

  <div class="card">
    <div class="section-label">Note du travail</div>
    <div class="work-note-wrap">
      <label for="work-note">Note obtenue</label>
      <input type="text" id="work-note" placeholder="ex : 85" inputmode="decimal" oninput="calculate()">
      <span style="font-size:14px; color:#888780;">/ 100</span>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Évaluations par les pairs</div>
    <div class="col-header">
      <span>Évaluateur</span>
      <span>Total /20</span>
      <span>En %</span>
      <span></span>
    </div>
    <div id="peers-container"></div>
    <div class="error-msg" id="error-msg">Valeur entre 0 et 20 seulement.</div>
    <button class="add-btn" id="add-btn" onclick="addPeer()">+ Ajouter un évaluateur</button>
  </div>

  <div class="card">
    <div class="section-label">Résultats</div>
    <div class="result-grid">
      <div class="metric">
        <div class="metric-label">Moyenne pairs</div>
        <div class="metric-value" id="avg-raw">—</div>
        <div class="metric-sub">sur 20</div>
      </div>
      <div class="metric">
        <div class="metric-label">Coefficient</div>
        <div class="metric-value accent" id="avg-pct">—</div>
        <div class="metric-sub">%</div>
      </div>
      <div class="metric">
        <div class="metric-label">Note finale</div>
        <div class="metric-value accent" id="final-note">—</div>
        <div class="metric-sub">sur 100</div>
      </div>
    </div>
    <div class="formula" id="formula-display">Note finale = note du travail × coefficient pairs</div>
  </div>
</div>

<script>
  let peers = [];
  let peerCount = 0;

  function addPeer() {
    if (peers.length >= 5) return;
    peerCount++;
    peers.push({ id: peerCount, val: null });
    renderPeers();
  }

  function removePeer(id) {
    peers = peers.filter(p => p.id !== id);
    renderPeers();
    calculate();
  }

  function updatePeer(id, raw) {
    const peer = peers.find(p => p.id === id);
    if (!peer) return;
    const inp = document.querySelector(`input[data-id="${id}"]`);
    if (raw === '') {
      peer.val = null;
      if (inp) inp.classList.remove('invalid');
    } else {
      const num = parseFloat(raw.replace(',', '.'));
      if (isNaN(num) || num < 0 || num > 20) {
        peer.val = null;
        if (inp) inp.classList.add('invalid');
      } else {
        peer.val = num;
        if (inp) inp.classList.remove('invalid');
      }
    }
    updatePctDisplay(id);
    calculate();
  }

  function updatePctDisplay(id) {
    const peer = peers.find(p => p.id === id);
    const el = document.getElementById(`pct-${id}`);
    if (!el || !peer) return;
    el.textContent = peer.val !== null ? ((peer.val / 20) * 100).toFixed(1) + ' %' : '—';
  }

  function renderPeers() {
    const container = document.getElementById('peers-container');
    container.innerHTML = '';
    peers.forEach((peer, idx) => {
      const row = document.createElement('div');
      row.className = 'peer-row';
      row.innerHTML = `
        <div class="peer-label">Évaluateur ${idx + 1}</div>
        <input type="text" inputmode="decimal" placeholder="0 – 20"
          value="${peer.val !== null ? peer.val : ''}"
          data-id="${peer.id}"
          oninput="updatePeer(${peer.id}, this.value)">
        <div class="pct-display" id="pct-${peer.id}">${peer.val !== null ? ((peer.val / 20) * 100).toFixed(1) + ' %' : '—'}</div>
        ${peers.length > 2
          ? `<button class="remove-btn" onclick="removePeer(${peer.id})" title="Supprimer">×</button>`
          : '<div></div>'}
      `;
      container.appendChild(row);
    });

    const addBtn = document.getElementById('add-btn');
    addBtn.disabled = peers.length >= 5;
  }

  function calculate() {
    const filled = peers.filter(p => p.val !== null);
    const avgRawEl = document.getElementById('avg-raw');
    const avgPctEl = document.getElementById('avg-pct');
    const finalEl = document.getElementById('final-note');
    const formulaEl = document.getElementById('formula-display');

    if (filled.length === 0) {
      avgRawEl.textContent = '—';
      avgPctEl.textContent = '—';
      finalEl.textContent = '—';
      formulaEl.textContent = 'Note finale = note du travail × coefficient pairs';
      return;
    }

    const avg = filled.reduce((a, p) => a + p.val, 0) / filled.length;
    const pct = (avg / 20) * 100;
    avgRawEl.textContent = avg.toFixed(2);
    avgPctEl.textContent = pct.toFixed(1);

    const raw = document.getElementById('work-note').value.replace(',', '.');
    const workNote = parseFloat(raw);
    if (!isNaN(workNote) && workNote >= 0 && workNote <= 100) {
      const final = workNote * (pct / 100);
      finalEl.textContent = final.toFixed(1);
      formulaEl.textContent = `${workNote} × ${(pct / 100).toFixed(4)} = ${final.toFixed(1)} pts`;
    } else {
      finalEl.textContent = '—';
      formulaEl.textContent = filled.length > 0
        ? `Coefficient pairs : ${pct.toFixed(1)} % — entrez la note du travail`
        : 'Note finale = note du travail × coefficient pairs';
    }
  }

  addPeer();
  addPeer();
</script>
</body>
</html>
